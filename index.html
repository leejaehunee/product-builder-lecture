








<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>인공지능 동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- TensorFlow.js and Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <main class="container">
        <button id="theme-toggle" aria-label="Toggle dark mode">
            <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg id="sun-icon" style="display:none;" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
        
        <header>
            <h1>동물상 테스트</h1>
            <p class="subtitle">AI가 분석하는 나의 닮은 동물상</p>
        </header>

        <div class="test-mode-toggle">
            <button id="upload-mode-btn" class="mode-btn active">사진 업로드</button>
            <button id="webcam-mode-btn" class="mode-btn">실시간 웹캠</button>
        </div>

        <!-- Image Upload Section -->
        <section id="upload-section" class="test-section">
            <div id="image-container">
                <img id="face-image" src="" alt="your image" style="display:none;" />
                <div id="upload-label">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                    <p>사진을 올리거나 눌러주세요</p>
                </div>
            </div>
            <input type="file" id="image-upload" accept="image/*" style="display:none;" />
            <button id="predict-btn" class="main-btn">분석 시작하기</button>
        </section>

        <!-- Webcam Section -->
        <section id="webcam-section" class="test-section" style="display:none;">
            <div id="webcam-container"></div>
            <button id="webcam-start-btn" class="main-btn">카메라 시작하기</button>
        </section>

        <section id="result-section" style="display:none;">
            <div id="label-container"></div>
        </section>

        <hr class="divider">

        <section class="contact-section">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/maqdlqzy" method="POST">
                <div class="form-group">
                    <input type="text" name="name" placeholder="이름" required>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="이메일" required>
                </div>
                <div class="form-group">
                    <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                </div>
                <button type="submit" class="submit-btn">보내기</button>
            </form>
        </section>

        <hr class="divider">

        <section class="comments-section">
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://buildertest.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
        </section>
    </main>
    <script src="main.js"></script>
</body>
</html>
